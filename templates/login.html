<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Global Study Arena</title>
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1e2f 100%);
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .arena-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            width: 90%;
            max-width: 350px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .auth-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 15px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }
        .auth-input:focus { border-color: #38bdf8; box-shadow: 0 0 10px rgba(56, 189, 248, 0.2); }
        .btn {
            background: linear-gradient(135deg, #38bdf8 0%, #2563eb 100%);
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            font-size: 16px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.3s;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(56, 189, 248, 0.4); }
        .error-msg { color: #ef4444; font-size: 14px; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="arena-card">
        <h2 style="margin-top: 0; color: #38bdf8; font-weight: 800;">ENTER ARENA</h2>
        
        <!-- This is where Flask shows errors if password is wrong -->
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="error-msg">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="text" name="username" class="auth-input" placeholder="Username" required>
            <input type="password" name="password" class="auth-input" placeholder="Password" required>
            <button type="submit" class="btn">Login</button>
        </form>
        <p style="margin-top: 20px; font-size: 14px; color: #94a3b8;">
            New recruit? <a href="/register" style="color: #38bdf8; text-decoration: none;">Create an account</a>
        </p>
    </div>
</body>
</html>
