<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Enter the Deep Work Arena</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⏳</text></svg>">
    <style>
        /* Exact same styling as the login page */
        body { background: linear-gradient(135deg, #0f172a 0%, #1e1e2f 100%); color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .arena-card { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 40px; text-align: center; width: 90%; max-width: 350px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .auth-input { width: 100%; background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.1); color: white; padding: 12px; border-radius: 12px; margin-bottom: 15px; box-sizing: border-box; outline: none; transition: 0.3s; }
        .auth-input:focus { border-color: #10b981; box-shadow: 0 0 10px rgba(16, 185, 129, 0.2); }
        .btn { background: linear-gradient(135deg, #10b981 0%, #059669 100%); color: white; border: none; padding: 14px; width: 100%; font-size: 16px; border-radius: 14px; cursor: pointer; font-weight: 700; transition: 0.3s; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4); }
        .error-msg { color: #ef4444; font-size: 14px; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="arena-card">
        <h2 style="margin-top: 0; color: #10b981; font-weight: 800;">JOIN ARENA</h2>
        
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="error-msg">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="text" name="username" class="auth-input" placeholder="Choose a Username" required>
            <input type="password" name="password" class="auth-input" placeholder="Create a Password" required>
            <button type="submit" class="btn">Create Account</button>
        </form>
        <p style="margin-top: 20px; font-size: 14px; color: #94a3b8;">
            Already registered? <a href="/login" style="color: #10b981; text-decoration: none;">Login here</a>
        </p>
    </div>
</body>
</html>
